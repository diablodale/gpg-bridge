name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allows manual runs

# Restrict all jobs to read-only contents by default; individual jobs add only what they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: pre-commit checks ──────────────────────────────────────────────────
  # Runs all prek pre-commit hooks (gitleaks, zizmor, prettier, TypeScript
  # compile, ESLint) on every file in the repo.  The build-and-test job below
  # only starts if this job succeeds, so quality gates can't be bypassed.
  checks:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      # Tell prek where to store its downloaded hook environments so that the
      # actions/cache step can persist them across runs.
      PREK_HOME: ~/.cache/prek
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache prek hook environments
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/prek
          # Invalidate when the hook list or their pinned versions change.
          key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            prek-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Run prek checks
        run: npx prek run --stage pre-commit --all-files

  # ── Job 2: build and unit test ────────────────────────────────────────────────
  # Compiles TypeScript and runs the full unit test suite.  Only starts after
  # the checks job passes — no point testing code that doesn't compile or lint.
  #
  # The shared, agent, and request unit tests all run via @vscode/test-cli,
  # which downloads and launches VS Code (Electron) as the extension host.
  # Electron requires a display server on Linux, so all test commands are
  # wrapped with xvfb-run.  xvfb is pre-installed on ubuntu-latest — no
  # apt-get step needed.
  test:
    name: Build and unit test
    needs: [checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run compile

      # @vscode/test-cli downloads a full VS Code binary (~167 MB) into each
      # package's .vscode-test/ folder before running tests.  Cache only the
      # versioned binary directories — globs exclude user-data/ and extensions/,
      # which contain VS Code runtime state that must not persist between runs.
      # Weekly key rotation picks up new stable releases without manual pinning.
      - name: Get week number for cache key
        id: date
        run: echo "week=$(date +%Y%W)" >> "$GITHUB_OUTPUT"
      - name: Cache VS Code test binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            shared/.vscode-test/vscode-*
            gpg-bridge-agent/.vscode-test/vscode-*
            gpg-bridge-request/.vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: vscode-test-${{ runner.os }}-

      - name: Unit tests
        run: xvfb-run -a npm test

      # lcov.info files from tsc + c8 use paths relative to each package root
      # (e.g. SF:src/extension.ts) and cross-package refs use "../" (e.g.
      # SF:../shared/src/gpgCli.ts).  Normalize to repo-root-relative paths so
      # Codecov can match them against the git tree.
      - name: Normalize coverage paths to repo-root-relative
        run: |
          # Strip leading ../ from cross-package refs in agent and request
          sed -i 's|^SF:\.\./|SF:|' gpg-bridge-agent/coverage/lcov.info
          sed -i 's|^SF:\.\./|SF:|' gpg-bridge-request/coverage/lcov.info
          # Prefix package-local src/ paths with each package's directory name
          sed -i 's|^SF:src/|SF:shared/src/|' shared/coverage/lcov.info
          sed -i 's|^SF:src/|SF:gpg-bridge-agent/src/|' gpg-bridge-agent/coverage/lcov.info
          sed -i 's|^SF:src/|SF:gpg-bridge-request/src/|' gpg-bridge-request/coverage/lcov.info

      # Upload lcov reports produced by the --coverage flag in each package's
      # test script.  Token is set for same-repo branches/PRs; fork PRs send
      # a tokenless upload (works for public repos with the Codecov GitHub App
      # installed).  Non-fatal so a Codecov outage never blocks a merge.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad #v5.5.3
        with:
          name: unittests
          # CODECOV_TOKEN only authorises coverage uploads; exposure risk does not warrant a dedicated environment.
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          # disable_search prevents Codecov from auto-discovering other coverage files
          # (e.g. coverage-final.json) which would cause double-counting.  Only the
          # lcov.info files listed below are uploaded.
          disable_search: true
          files: shared/coverage/lcov.info,gpg-bridge-agent/coverage/lcov.info,gpg-bridge-request/coverage/lcov.info
          # Set a flag to filter for unit tests in Codecov reports.  This is helpful
          # because we also have end-to-end tests that report coverage, and we want to be
          # able to distinguish between them in Codecov's UI and PR comments.
          flags: unittests
          # Don't fail the job if the upload fails — we don't want flaky network
          # issues or Codecov outages to block merges.
          fail_ci_if_error: false
