name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch: # allows manual runs

# Restrict all jobs to read-only contents by default; individual jobs add only what they need.
permissions: {}

concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  # ── Job 1: pre-commit checks ──────────────────────────────────────────────────
  # Runs all prek pre-commit hooks (gitleaks, zizmor, prettier, TypeScript
  # compile, ESLint) on every file in the repo.  The build-and-test job below
  # only starts if this job succeeds, so quality gates can't be bypassed.
  checks:
    name: Pre-commit checks
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # required to list PR commits for signature verification
    env:
      # Tell prek where to store its downloaded hook environments so that the
      # actions/cache step can persist them across runs.
      PREK_HOME: ~/.cache/prek
    steps:
      # Verify every commit in the PR is GPG/SSH signed and that GitHub has
      # verified the signature against the author's registered keys.  Runs
      # first — gh CLI and github.token are available immediately without
      # checkout or Node.  Skipped on push and workflow_dispatch.
      - name: Verify all PR commits are signed
        if: github.event_name == 'pull_request'
        env:
          GH_TOKEN: ${{ github.token }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          FAILED=0
          while IFS= read -r SHA; do
            VERIFIED=$(gh api "repos/${GITHUB_REPOSITORY}/commits/${SHA}" \
              --jq '.commit.verification.verified')
            if [ "$VERIFIED" != "true" ]; then
              echo "::error::Commit ${SHA} is not signed or has an unverified signature"
              FAILED=1
            fi
          done < <(gh api "repos/${GITHUB_REPOSITORY}/pulls/${PR_NUMBER}/commits" \
                     --paginate --jq '.[].sha')
          [ $FAILED -eq 0 ] || exit 1

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Cache prek hook environments
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/prek
          # Invalidate when the hook list or their pinned versions change.
          key: prek-${{ runner.os }}-${{ hashFiles('.pre-commit-config.yaml') }}
          restore-keys: |
            prek-${{ runner.os }}-

      - name: Install dependencies
        run: npm install

      - name: Run prek checks
        run: npx prek run --stage pre-commit --all-files

  # ── Job 2: build and unit test ────────────────────────────────────────────────
  # Compiles TypeScript and runs the full unit test suite.  Only starts after
  # the checks job passes — no point testing code that doesn't compile or lint.
  #
  # The shared, agent, and request unit tests all run via @vscode/test-cli,
  # which downloads and launches VS Code (Electron) as the extension host.
  # Electron requires a display server on Linux, so all test commands are
  # wrapped with xvfb-run.  xvfb is pre-installed on ubuntu-latest — no
  # apt-get step needed.
  test:
    name: Build and unit test
    needs: [checks]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      - name: Compile
        run: npm run compile

      # @vscode/test-cli downloads a full VS Code binary (~167 MB) into each
      # package's .vscode-test/ folder before running tests.  Cache only the
      # versioned binary directories — globs exclude user-data/ and extensions/,
      # which contain VS Code runtime state that must not persist between runs.
      # Weekly key rotation picks up new stable releases without manual pinning.
      - name: Get week number for cache key
        id: date
        run: echo "week=$(date +%Y%W)" >> "$GITHUB_OUTPUT"
      - name: Cache VS Code test binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            shared/.vscode-test/vscode-*
            gpg-bridge-agent/.vscode-test/vscode-*
            gpg-bridge-request/.vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: vscode-test-${{ runner.os }}-

      - name: Unit tests
        run: xvfb-run -a npm test

      # lcov.info files from tsc + c8 use paths relative to each package root
      # (e.g. SF:src/extension.ts) and cross-package refs use "../" (e.g.
      # SF:../shared/src/gpgCli.ts).  Normalize to repo-root-relative paths so
      # Codecov can match them against the git tree.
      - name: Normalize coverage paths to repo-root-relative
        run: |
          # Strip leading ../ from cross-package refs in agent and request
          sed -i 's|^SF:\.\./|SF:|' gpg-bridge-agent/coverage/unit/lcov.info
          sed -i 's|^SF:\.\./|SF:|' gpg-bridge-request/coverage/unit/lcov.info
          # Prefix package-local src/ paths with each package's directory name
          sed -i 's|^SF:src/|SF:shared/src/|' shared/coverage/unit/lcov.info
          sed -i 's|^SF:src/|SF:gpg-bridge-agent/src/|' gpg-bridge-agent/coverage/unit/lcov.info
          sed -i 's|^SF:src/|SF:gpg-bridge-request/src/|' gpg-bridge-request/coverage/unit/lcov.info

      # Upload lcov reports produced by the --coverage flag in each package's
      # test script.  Token is set for same-repo branches/PRs; fork PRs send
      # a tokenless upload (works for public repos with the Codecov GitHub App
      # installed).  Non-fatal so a Codecov outage never blocks a merge.
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad #v5.5.3
        with:
          name: unittests
          # CODECOV_TOKEN only authorises coverage uploads; exposure risk does not warrant a dedicated environment.
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          # disable_search prevents Codecov from auto-discovering other coverage files
          # (e.g. coverage-final.json) which would cause double-counting.  Only the
          # lcov.info files listed below are uploaded.
          disable_search: true
          files: shared/coverage/unit/lcov.info,gpg-bridge-agent/coverage/unit/lcov.info,gpg-bridge-request/coverage/unit/lcov.info
          # Set a flag to filter for unit tests in Codecov reports.  This is helpful
          # because we also have end-to-end tests that report coverage, and we want to be
          # able to distinguish between them in Codecov's UI and PR comments.
          flags: unittests
          # Don't fail the job if the upload fails — we don't want flaky network
          # issues or Codecov outages to block merges.
          fail_ci_if_error: false

      # Rewrite JUnit XML file/line references from compiled JS (out/) back to
      # TypeScript sources (src/) using source maps produced by tsc.  This is
      # required for EnricoMi/publish-unit-test-result-action to render inline
      # annotations alongside the correct TypeScript source lines in GitHub's
      # PR diff and commit views.
      - name: Rewrite test result paths to TypeScript sources
        if: always()
        run: node scripts/rewrite-junit-paths.cjs

      # Upload JUnit XML results so publish-test-results.yml can surface them
      # as a PR check, comment, and per-failure annotations.  if: always() ensures
      # the artifacts are uploaded even when the test step above fails — that is
      # exactly when you most need to inspect the results.
      # if-no-files-found: error ensures the artifact is never silently empty so
      # the downstream download fails loudly rather than publishing 0 tests as ✓.
      - name: Upload test result artifacts
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results-unit
          path: |
            shared/test-results/unit/*.xml
            gpg-bridge-agent/test-results/unit/*.xml
            gpg-bridge-request/test-results/unit/*.xml
          retention-days: 7
          if-no-files-found: error

      # Upload the GitHub event JSON so publish-test-results.yml can associate
      # results with the correct PR and commit SHA (needed for fork PRs where
      # the triggering workflow_run event references the default branch, not the fork).
      - name: Upload GitHub event file
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: github-event
          path: ${{ github.event_path }}
          retention-days: 7

  # ── Job 3: integration tests (shared + agent) ─────────────────────────────────
  # Runs integration tests for shared and agent packages against real gpg/gpg-agent
  # binaries (pre-installed on ubuntu-latest) and the VS Code extension host
  # (Electron — requires xvfb, which is also pre-installed).
  # gpg-bridge-request integration tests are excluded: they require devcontainer
  # networking (phase2/phase3) that is not available in the standard CI environment.
  integration-test:
    name: Integration tests (shared, agent)
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 22
          cache: 'npm'

      - name: Install dependencies
        run: npm install

      # Reuse the same weekly cache key as the unit-test job so a warm cache
      # from an earlier job in the same week avoids re-downloading VS Code.
      - name: Get week number for cache key
        id: date
        run: echo "week=$(date +%Y%W)" >> "$GITHUB_OUTPUT"
      - name: Cache VS Code test binaries
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: |
            shared/.vscode-test/vscode-*
            gpg-bridge-agent/.vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: vscode-test-${{ runner.os }}-

      # Each pretest:integration hook compiles its package's integration test
      # files before running — no separate compile step needed here.
      - name: Shared integration tests
        run: xvfb-run -a npm --prefix shared run test:integration

      - name: Agent integration tests
        run: xvfb-run -a npm --prefix gpg-bridge-agent run test:integration

      # Normalize lcov paths to repo-root-relative — same logic as unit tests.
      - name: Normalize integration coverage paths to repo-root-relative
        run: |
          sed -i 's|^SF:\.\./|SF:|' gpg-bridge-agent/coverage/integration/lcov.info
          sed -i 's|^SF:src/|SF:shared/src/|' shared/coverage/integration/lcov.info
          sed -i 's|^SF:src/|SF:gpg-bridge-agent/src/|' gpg-bridge-agent/coverage/integration/lcov.info

      - name: Upload integration coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad #v5.5.3
        with:
          name: integrationtests
          # CODECOV_TOKEN only authorises coverage uploads; exposure risk does not warrant a dedicated environment.
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          disable_search: true
          files: shared/coverage/integration/lcov.info,gpg-bridge-agent/coverage/integration/lcov.info
          flags: integrationtests
          fail_ci_if_error: false

      # Rewrite JUnit XML file/line references from compiled JS (out/) back to
      # TypeScript sources (src/) — same rewriter used for unit tests.
      - name: Rewrite integration test result paths to TypeScript sources
        if: always()
        run: node scripts/rewrite-junit-paths.cjs

      - name: Upload integration test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results-integration
          path: |
            shared/test-results/integration/*.xml
            gpg-bridge-agent/test-results/integration/*.xml
          retention-days: 7
          if-no-files-found: error

  # ── Job 4: request integration tests ──────────────────────────────────────────
  # Runs gpg-bridge-request integration tests (Phase 2: request proxy chain;
  # Phase 3: gpg CLI) inside a Dev Containers devcontainer.  Parallel with Job 3:
  # no shared lcov files, artifacts, or coverage data between the two jobs.
  # Docker is pre-installed on ubuntu-latest; xvfb is also pre-installed.
  #
  # The devcontainer image is built from .devcontainer/Dockerfile on every run using
  # docker/build-push-action with registry layer cache (cache-from: type=registry).
  # On a full cache hit the build step completes in ~10-30 s with no network install.
  # Tests always run against the image from the current commit — no N-1 false-pass risk.
  # push: true only on refs/heads/main — PRs load locally only; no PR can poison ghcr.io.
  request-integration-test:
    name: Integration tests (request)
    needs: [test]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # push devcontainer image to ghcr.io on main; GitHub strips this for fork PR tokens
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Set up Node.js 22
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0 # zizmor: ignore[cache-poisoning]
        with:
          node-version: 22
          # npm cache is disabled on main (where push: true) to prevent Cacheract-style
          # pre-poisoning: a malicious fork PR could plant a poisoned node_modules cache
          # entry that lifecycle scripts run before docker/build-push-action pushes to
          # ghcr.io. On PR branches (push: false / load: true) the blast radius is
          # limited to the ephemeral runner — no registry image can be corrupted — so
          # caching is safe and avoids the ~30-60 s extra install time on every PR run.
          cache: ${{ github.ref != 'refs/heads/main' && 'npm' || '' }}
          package-manager-cache: ${{ github.ref != 'refs/heads/main' }}

      - name: Install dependencies
        run: npm install

      # Runner TypeScript files (requestProxyRunTest.ts, gpgCliRunTest.ts) must be
      # compiled before the pretest:integration hook invokes them via @vscode/test-electron.
      - name: Compile
        run: npm run compile

      - name: Authenticate to ghcr.io
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      # docker/setup-buildx-action is intentionally omitted: ubuntu-latest runners
      # pre-install Docker BuildKit and buildx, and the default docker driver supports
      # cache-to: type=inline without a docker-container driver.
      - name: Extract devcontainer image metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          images: ghcr.io/diablodale/gpg-bridge/devcontainer-request
          # Fixed environment tag names — not version/event-derived.
          tags: |
            type=raw,value=phase2
            type=raw,value=phase3
          # Suppress the auto-generated :latest tag.
          flavor: |
            latest=false
          labels: |
            org.opencontainers.image.title=gpg-bridge devcontainer
            org.opencontainers.image.description=Dev container image for gpg-bridge-request integration tests (Phase 2 and Phase 3)

      # Build the devcontainer image from .devcontainer/Dockerfile. cache-from pulls
      # previously pushed layers from ghcr.io so only changed layers are rebuilt; on a
      # full cache hit (no Dockerfile or package changes) the step completes in ~10-30 s
      # with no MCR download and no npm install inside the build.
      # push: only on refs/heads/main — PRs load the image into the local Docker daemon
      # without pushing to ghcr.io, preventing a malicious PR from poisoning the shared
      # cache image. GitHub also strips packages: write from fork PR tokens at the API level.
      - name: Build devcontainer image
        uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: .devcontainer/Dockerfile
          # load makes the built image available in the local Docker daemon so devcontainer up
          # can use it via cacheFrom. Required on PR branches where push is false; mutually
          # exclusive with push on the default docker driver, so only one is true at a time.
          push: ${{ github.ref == 'refs/heads/main' }}
          load: ${{ github.ref != 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          # OCI labels are embedded in the image config layer.
          labels: ${{ steps.meta.outputs.labels }}
          # OCI annotations are embedded in the manifest — read by ghcr.io to
          # populate the package UI (description, source link, etc.).
          annotations: ${{ steps.meta.outputs.annotations }}
          # Pull the previously pushed image as a layer cache source so only
          # changed layers are rebuilt (e.g. updated package-lock.json).
          cache-from: type=registry,ref=ghcr.io/diablodale/gpg-bridge/devcontainer-request:phase2
          # Embed BuildKit layer cache metadata into the pushed image manifest.
          # min mode is sufficient for this single-stage Dockerfile.
          cache-to: type=inline

      # Reuse the same weekly cache key as Jobs 2 and 3 — a warm cache from an
      # earlier job in the same week avoids re-downloading VS Code.
      # Skipped on main (same as npm cache) — no caching steps before the docker push.
      - name: Get week number for cache key
        if: github.ref != 'refs/heads/main'
        id: date
        run: echo "week=$(date +%Y%W)" >> "$GITHUB_OUTPUT"
      - name: Cache VS Code test binaries
        if: github.ref != 'refs/heads/main'
        uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3 # zizmor: ignore[cache-poisoning]
        with:
          path: gpg-bridge-request/.vscode-test/vscode-*
          key: vscode-test-${{ runner.os }}-${{ steps.date.outputs.week }}
          restore-keys: vscode-test-${{ runner.os }}-

      # Both Phase 2 (request proxy chain) and Phase 3 (gpg CLI) run sequentially
      # via the test:integration script (requestProxyRunTest && gpgCliRunTest).
      # VS Code Electron requires a display server on Linux; xvfb is pre-installed.
      - name: Request integration tests
        run: xvfb-run -a npm --prefix gpg-bridge-request run test:integration

      # Normalize lcov paths to repo-root-relative — same logic as unit tests.
      - name: Normalize request integration coverage paths to repo-root-relative
        run: |
          sed -i 's|^SF:\.\./|SF:|' gpg-bridge-request/coverage/integration/lcov.info
          sed -i 's|^SF:src/|SF:gpg-bridge-request/src/|' gpg-bridge-request/coverage/integration/lcov.info

      - name: Upload request integration coverage to Codecov
        uses: codecov/codecov-action@1af58845a975a7985b0beb0cbe6fbbb71a41dbad #v5.5.3
        with:
          name: integrationtests-request
          # CODECOV_TOKEN only authorises coverage uploads; exposure risk does not warrant a dedicated environment.
          token: ${{ secrets.CODECOV_TOKEN }} # zizmor: ignore[secrets-outside-env]
          disable_search: true
          files: gpg-bridge-request/coverage/integration/lcov.info
          # Same flag as Job 3 — Codecov merges multiple per-commit per-flag uploads.
          flags: integrationtests
          fail_ci_if_error: false

      - name: Rewrite request integration test result paths to TypeScript sources
        if: always()
        run: node scripts/rewrite-junit-paths.cjs

      - name: Upload request integration test results
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        if: always()
        with:
          name: test-results-integration-request
          path: gpg-bridge-request/test-results/integration/*.xml
          retention-days: 7
          if-no-files-found: error
