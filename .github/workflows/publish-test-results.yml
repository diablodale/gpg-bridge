name: Publish test results

on:
  workflow_run: # zizmor: ignore[dangerous-triggers]
    # workflow_run is required for fork PR support: it always executes the
    # workflow file from the default branch of the target repo, never from
    # the fork.  A fork contributor cannot escalate privileges by modifying
    # this file in their PR.  This is the threat model workflow_run was
    # designed to address.  See docs/test-reporting.md § Fork PR Support.
    workflows: ['CI'] # must match the name: field in ci.yml exactly
    types: [completed]

# Restrict all jobs to read-only contents by default; individual jobs add only what they need.
permissions: {}

# Mirror the ci.yml concurrency strategy: cancel a stale publish run when a
# newer push to the same branch/PR triggers a fresh CI run and a fresh publish.
# Group by source repo + branch so that different forks with identically-named
# branches remain independent (github.ref is the default branch here, not the
# source branch, so it cannot be used as the group key).
concurrency:
  group: ${{ github.workflow }}-${{ github.event.workflow_run.head_repository.full_name }}-${{ github.event.workflow_run.head_branch }}
  cancel-in-progress: true

jobs:
  publish-test-results:
    name: Publish test results
    runs-on: ubuntu-latest
    # Run for all CI conclusions except 'skipped'.
    # If this publish run is itself cancelled by the concurrency policy (a newer
    # push to the same PR arrived), that is fine — the newer publish run will
    # post the authoritative results for the new HEAD commit.
    # If CI concluded as 'cancelled' and no newer push supersedes it, the
    # artifact download below will fail → the 'Unit test results' check registers
    # as failed → PR is blocked.  This is intentional: a cancelled CI run must
    # never unblock a PR.
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    permissions:
      actions: read # required to download artifacts from the triggering run
      checks: write # required to post the 'Unit test results' check on the commit
      pull-requests: write # required to post a PR comment with pass/fail counts
    outputs:
      json: ${{ steps.publish.outputs.json }}
    steps:
      - name: Download test result artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: test-results-unit
          path: test-results
          github-token: ${{ github.token }}

      - name: Download GitHub event file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: github-event
          path: github-event
          github-token: ${{ github.token }}

      - name: Publish test results
        id: publish
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          # These three fields associate results with the originating PR/commit,
          # not the default-branch commit that triggered the workflow_run event.
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: github-event/event.json
          event_name: ${{ github.event.workflow_run.event }}
          files: test-results/**/*.xml
          check_name: Unit test results
          comment_mode: always

  publish-integration-results:
    name: Publish integration test results
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion != 'skipped' }}
    permissions:
      actions: read # required to download artifacts from the triggering run
      checks: write # required to post the 'Integration test results' check on the commit
      pull-requests: write # required to post a PR comment with pass/fail counts
    outputs:
      json: ${{ steps.publish.outputs.json }}
    steps:
      - name: Download integration test result artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: test-results-integration
          path: test-results
          github-token: ${{ github.token }}

      - name: Download request integration test result artifacts
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: test-results-integration-request
          path: test-results
          github-token: ${{ github.token }}

      - name: Download GitHub event file
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          run-id: ${{ github.event.workflow_run.id }}
          name: github-event
          path: github-event
          github-token: ${{ github.token }}

      - name: Publish integration test results
        id: publish
        uses: EnricoMi/publish-unit-test-result-action@c950f6fb443cb5af20a377fd0dfaa78838901040 # v2.23.0
        with:
          commit: ${{ github.event.workflow_run.head_sha }}
          event_file: github-event/event.json
          event_name: ${{ github.event.workflow_run.event }}
          files: test-results/**/*.xml
          check_name: Integration test results
          comment_mode: always

  update-badges:
    name: Update test result badges
    runs-on: ubuntu-latest
    needs: [publish-test-results, publish-integration-results]
    # Only update badges for pushes to the default branch of the upstream repo.
    # Fork PRs surface results via the check and comment; badges reflect main only.
    if: >-
      ${{ github.event.workflow_run.event == 'push' &&
          github.event.workflow_run.head_branch == github.event.repository.default_branch }}
    permissions:
      contents: write # required to push the updated badge JSON to the badges branch
    steps:
      - name: Write badge JSON files and push to badges branch
        env:
          UNIT_JSON: ${{ needs.publish-test-results.outputs.json }}
          INTEGRATION_JSON: ${{ needs.publish-integration-results.outputs.json }}
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
          GH_TOKEN: ${{ github.token }}
        run: |
          # Build a badge JSON string from a RESULTS_JSON env var name, label, and output var name.
          # jq reads the JSON via env.<varname> — never shell-expanded into the jq expression.
          make_badge() {
            local envvar="$1" label="$2" outvar="$3"
            local passed failed skipped msg color
            read -r passed failed skipped < <(
              jq -rn --arg v "$envvar" 'env[$v] | fromjson | .stats | [.tests_succ, .tests_fail, .tests_skip] | @tsv'
            )
            # Reject non-integer values before they reach arithmetic or string interpolation.
            for val in "$passed" "$failed" "$skipped"; do
              [[ "$val" =~ ^[0-9]+$ ]] || { echo "Non-integer stat: $val" >&2; exit 1; }
            done
            # Build message from all non-zero counts so the scale of any failure
            # is visible at a glance (e.g. "41 passed, 1 failed" vs just "1 failed").
            msg="${passed} passed"
            [ "$failed"  -gt 0 ] && msg="${msg}, ${failed} failed"
            [ "$skipped" -gt 0 ] && msg="${msg}, ${skipped} skipped"

            # Set badge color: red if any failures, green otherwise.
            # Skipped tests are platform-conditional by design and do not indicate a problem.
            if [ "$failed" -gt 0 ]; then color="red"
            else                         color="brightgreen"
            fi
            printf -v "$outvar" '{"schemaVersion":1,"label":"%s","message":"%s","color":"%s"}' "$label" "$msg" "$color"
          }

          make_badge UNIT_JSON        "Unit tests"        UNIT_BADGE
          make_badge INTEGRATION_JSON "Integration tests" INTEGRATION_BADGE

          # Get coverage % from Codecov for this commit. Retry up to 3 times with
          # 15-second gaps to allow Codecov time to finish processing the uploads.
          COVERAGE_BADGE=""
          COV_RAW=""
          for attempt in 1 2 3; do
            COV_JSON=$(curl -sf \
              -H "Accept: application/json" \
              "https://api.codecov.io/api/v2/github/diablodale/repos/gpg-bridge/totals/?sha=${HEAD_SHA}" \
              || echo '{}')
            COV_RAW=$(echo "$COV_JSON" | jq -r '.totals.coverage // empty')
            [[ "$COV_RAW" =~ ^[0-9]+(\.[0-9]+)?$ ]] && break
            [ "$attempt" -lt 3 ] && sleep 15
          done
          if [[ "$COV_RAW" =~ ^[0-9]+(\.[0-9]+)?$ ]]; then
            COV_INT=$(printf '%.0f' "$COV_RAW")
            [[ "$COV_INT" =~ ^[0-9]+$ ]] || { echo "::error::unexpected coverage value: $COV_INT"; exit 1; }
            if   [ "$COV_INT" -ge 80 ]; then COV_COLOR="brightgreen"
            elif [ "$COV_INT" -ge 60 ]; then COV_COLOR="yellow"
            else                              COV_COLOR="red"
            fi
            COVERAGE_BADGE=$(printf '{"schemaVersion":1,"label":"Coverage","message":"%s%%","color":"%s"}' "$COV_INT" "$COV_COLOR")
          else
            echo "::warning::could not get coverage from Codecov after 3 attempts; skipping coverage badge"
          fi

          # Use the pre-set GITHUB_REPOSITORY env var rather than a template
          # expression to avoid template injection into the shell script.
          REPO_URL="https://github.com/${GITHUB_REPOSITORY}.git"

          # Inject the token as an HTTP Authorization header — keeps the token
          # out of URLs and out of .git/config on the ephemeral runner.
          # Git-over-HTTPS uses Basic auth; Bearer is rejected by git endpoints.
          git config --global http.extraheader "AUTHORIZATION: Basic $(printf 'x-access-token:%s' "${GH_TOKEN}" | base64 -w0)"

          # Clone the badges branch. If it does not exist yet, bootstrap it as an
          # orphan — no manual one-time setup is needed.
          if git clone --depth 1 --branch badges "$REPO_URL" badge-repo 2>/dev/null; then
            cd badge-repo
          else
            mkdir badge-repo && cd badge-repo
            git init -b badges
            git remote add origin "$REPO_URL"
          fi

          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          printf '%s\n' "$UNIT_BADGE"        > unit-tests.json
          printf '%s\n' "$INTEGRATION_BADGE" > integration-tests.json
          git add unit-tests.json integration-tests.json
          if [ -n "$COVERAGE_BADGE" ]; then
            printf '%s\n' "$COVERAGE_BADGE" > coverage.json
            git add coverage.json
          fi
          # Nothing changed (e.g. same counts on a re-run) — skip commit and push.
          git diff --cached --quiet && exit 0
          git commit -m "chore: update test badges"
          git push origin HEAD:badges
