# Codecov configuration — https://docs.codecov.com/docs/codecovyml-reference

codecov:
  notify:
    # Wait for all 3 uploads (unit, shared+agent integration, request integration)
    # before computing coverage stats and posting status checks/emails.
    # Without this, Codecov notifies after the first upload and may mark the
    # commit as failed before the later uploads arrive.
    after_n_builds: 3
    # Also wait for all other CI checks to reach a terminal state before posting
    # Codecov status checks or sending emails.  Prevents notification during an
    # in-progress pipeline.  Codecov never waits for its own checks.
    wait_for_ci: true

coverage:
  status:
    project:
      default:
        # Must not drop below the base commit's measured coverage.
        target: auto
        # Allow up to 2% slip to avoid noise from small test-count variance.
        threshold: 2%
    patch:
      default:
        # New/changed lines introduced in the PR must be ≥70% covered.
        target: 70%

component_management:
  individual_components:
    - component_id: shared
      name: Shared library
      paths:
        - shared/src/**
    - component_id: agent
      name: GPG Bridge Agent
      paths:
        - gpg-bridge-agent/src/**
    - component_id: request
      name: GPG Bridge Request
      paths:
        - gpg-bridge-request/src/**

comment:
  layout: 'condensed_header, diff, components, files'
  behavior: default
